type: object
properties:
  name:
    type: string
    maxLength: 100
    description: "Nome da iniciativa"
  image:
    type: string
    format: base64url
    description: "Imagem do perfil da iniciativa codificada em Base64"
  parent:
    description: "Identificador da iniciativa pai"
    type: string
    format: uuid
  createdBy:
    description: "Identificador do agente criador da iniciativa"
    type: string
    format: uuid
  space:
    description: "Identificador do espaço ao qual a iniciativa pertence"
    type: string
    format: uuid
  extraFields:
    type: object
    description: "Os campos extras da iniciativa"
    properties:
      key:
        type: string
        description: 'Valor da chave'